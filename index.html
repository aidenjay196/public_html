<div class="container">
    <p1 id="joke">Loading joke...</p1>
    <button id="jokeBtn">Get New Joke</button>
</div>

<script>
    const jokeEl = document.getElementById('joke');
    const buttonEl = document.getElementById('jokeBtn');


    const url = 'https://icanhazdadjoke.com/';

    async function getJoke() {
        jokeEl.innerHTML = 'Thinking...';
        
        try {
            const response = await fetch(url, {
                headers: {
                    'Accept': 'application/json'
                }
            });

            const data = await response.json();
            
            
            jokeEl.innerHTML = data.joke;
        } catch (error) {
            jokeEl.innerHTML = 'Dad is sleeping... (Error)';
        }
    }

    buttonEl.addEventListener('click', getJoke);
    
   
    getJoke();
</script>
